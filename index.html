<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Signal Operator System</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main class="shell">
      <section id="authSection" class="card auth-card">
        <h1>Traffic Signal Ops</h1>
        <p>Minimal attendance and shift tracking for operators.</p>
        <button id="showRegisterBtn" class="secondary">Register as Operator</button>
        <form id="loginForm">
          <input id="email" type="email" placeholder="Email" required />
          <input id="password" type="password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
        <form id="registerForm" class="hidden stack-form">
          <input id="registerFullName" type="text" placeholder="Full name" required />
          <input id="registerEmployeeId" type="text" placeholder="Employee ID" required />
          <input id="registerMobile" type="text" placeholder="Mobile number" required />
          <input id="registerEmail" type="email" placeholder="Email" required />
          <input id="registerPassword" type="password" placeholder="Password" required />
          <input id="registerConfirmPassword" type="password" placeholder="Confirm password" required />
          <button type="submit">Submit Registration</button>
          <button type="button" id="cancelRegisterBtn" class="secondary">Cancel</button>
        </form>
        <p id="message" class="message"></p>
        <p id="registerMessage" class="message"></p>
      </section>

      <section id="appSection" class="hidden">
        <header class="topbar">
          <div>
            <h2 id="welcomeTitle">Welcome</h2>
            <p id="userMeta">Loading your workspace...</p>
          </div>
          <button id="logoutBtn" class="secondary">Logout</button>
        </header>

        <section id="operatorView" class="hidden">
          <div class="card">
            <h3>Operator Panel</h3>
            <label for="intersectionSelect">Select Intersection</label>
            <select id="intersectionSelect"></select>
            <label for="shiftSelect">Select Shift</label>
            <select id="shiftSelect"></select>
            <div class="status-box" id="gpsStatus">GPS: waiting</div>
            <div class="actions">
              <button id="shiftInBtn">Shift In</button>
              <button id="shiftOutBtn" class="secondary">Shift Out</button>
            </div>
            <p id="operatorMessage" class="message"></p>
          </div>

          <div class="card">
            <h3>Recent Attendance</h3>
            <div id="operatorHistory"></div>
          </div>
        </section>

        <section id="adminView" class="hidden">
          <div class="grid">
            <div class="card metric">
              <h3>Operators</h3>
              <p id="metricOperators">0</p>
            </div>
            <div class="card metric">
              <h3>Intersections</h3>
              <p id="metricIntersections">0</p>
            </div>
            <div class="card metric">
              <h3>Active Duty</h3>
              <p id="metricActive">0</p>
            </div>
            <div class="card metric">
              <h3>Pending Approval</h3>
              <p id="metricPending">0</p>
            </div>
          </div>

          <div class="card">
            <h3>Operator Approvals</h3>
            <div id="approvalList" class="list-box"></div>
          </div>

          <div class="card">
            <h3>Manage Intersections</h3>
            <form id="intersectionForm" class="stack-form">
              <input id="intersectionId" type="hidden" />
              <div class="form-grid">
                <input id="intersectionName" type="text" placeholder="Intersection name" required />
                <input id="intersectionCode" type="text" placeholder="Code" required />
              </div>
              <div class="form-grid">
                <input id="intersectionLat" type="number" step="any" placeholder="Latitude" />
                <input id="intersectionLng" type="number" step="any" placeholder="Longitude" />
              </div>
              <div class="form-grid">
                <input id="intersectionRadius" type="number" min="0" placeholder="Radius (m)" />
                <label class="inline-check">
                  <input id="intersectionActive" type="checkbox" checked />
                  Active
                </label>
              </div>
              <div class="actions">
                <button type="submit" id="intersectionSubmitBtn">Add Intersection</button>
                <button type="button" id="cancelIntersectionEdit" class="secondary hidden">Cancel</button>
              </div>
            </form>
            <p id="intersectionMessage" class="message"></p>
            <div id="intersectionList" class="list-box"></div>
          </div>

          <div class="card">
            <h3>Manage Shifts</h3>
            <form id="shiftForm" class="stack-form">
              <input id="shiftId" type="hidden" />
              <div class="form-grid">
                <input id="shiftName" type="text" placeholder="Shift name" required />
                <input id="shiftStart" type="text" placeholder="Start time" required />
                <input id="shiftEnd" type="text" placeholder="End time" required />
              </div>
              <div class="actions">
                <label class="inline-check">
                  <input id="shiftActive" type="checkbox" checked />
                  Active
                </label>
                <button type="submit" id="shiftSubmitBtn">Add Shift</button>
                <button type="button" id="cancelShiftEdit" class="secondary hidden">Cancel</button>
              </div>
            </form>
            <p id="shiftMessage" class="message"></p>
            <div id="shiftList" class="list-box"></div>
          </div>

          <div class="card">
            <h3>Live Duty List</h3>
            <div id="adminList"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
